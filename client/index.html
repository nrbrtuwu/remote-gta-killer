<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Remote Killer</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <div class="app">
            <header class="header">
                <div>
                    <h1>Remote Killer</h1>
                    <p class="sub">Control dashboard</p>
                </div>
            </header>

            <section class="status-bar">
                <div class="pill" id="serverStatus">Disconnected</div>
                <div class="pill" id="latency">Server latency: -- ms</div>
                <div class="pill" id="agentCount">Agents: 0</div>
            </section>

            <section class="auth">
                <div class="auth-field">
                    <input
                        id="tokenInput"
                        type="password"
                        placeholder="Shared token"
                    />
                    <button id="connectBtn" type="button">Connect</button>
                </div>
            </section>

            <section class="controls">
                <div class="select-row">
                    <label for="agentSelect">Target:</label>
                    <select id="agentSelect"></select>
                </div>
                <div class="kill-row">
                    <button id="killBtn" class="kill">KILL GTA</button>
                    <button id="killAllBtn" class="kill-all">Kill All</button>
                </div>
            </section>

            <section class="activity">
                <div class="tabs" role="tablist">
                    <button
                        class="tab active"
                        id="tab-agents"
                        role="tab"
                        aria-controls="agentsTab"
                        aria-selected="true"
                        type="button"
                        data-tab="agentsTab"
                    >
                        Connected PCs
                    </button>
                    <button
                        class="tab"
                        id="tab-logs"
                        role="tab"
                        aria-controls="logsTab"
                        aria-selected="false"
                        type="button"
                        data-tab="logsTab"
                    >
                        Action Logs
                    </button>
                </div>
                <div
                    id="agentsTab"
                    class="tab-panel active"
                    role="tabpanel"
                    aria-labelledby="tab-agents"
                >
                    <h2>Connected PCs</h2>
                    <div class="agent-table">
                        <div class="agent-table-header">
                            <span>Hostname</span>
                            <span>Last seen</span>
                            <span>Latency to server</span>
                            <span>GTA running</span>
                        </div>
                        <div id="agentList" class="agent-list"></div>
                    </div>
                </div>
                <div
                    id="logsTab"
                    class="tab-panel"
                    role="tabpanel"
                    aria-labelledby="tab-logs"
                >
                    <h2>Action Logs</h2>
                    <div id="logList" class="log-list"></div>
                </div>
            </section>
        </div>

        <script src="/socket.io/socket.io.js"></script>
        <script src="app.js"></script>
    </body>
</html>
